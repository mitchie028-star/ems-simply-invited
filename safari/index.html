<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safari Invitation</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<!-- INTRO -->
<div id="startScreen" class="start-screen">
  <div class="intro-content">
    <h1>LET'S GET WILD</h1>
    <p>Tap to begin the adventure</p>
    <span>Safari Invitation</span>
  </div>
</div>

<!-- BACKGROUND VIDEO -->
<video id="bgVideo" class="bg-video" playsinline muted loop>
  <source src="./assets/safari-bg.mp4" type="video/mp4" />
</video>

<!-- SOUND -->
<audio id="whoosh" src="./assets/whoosh.mp3" preload="auto"></audio>

<!-- SCENE -->
<div class="scene">

  <!-- ETHAN -->
  <img id="ethan" class="baby" src="./assets/ethan.png" alt="Ethan" />

  <!-- TITLE -->
  <div id="title" class="title">
    Ethan’s Wild One Safari Adventure
  </div>

  <!-- RSVP -->
  <div id="rsvp" class="rsvp-scene">
    <div class="card">
      <h2>RSVP</h2>

      <form id="rsvpForm">
        <input type="text" placeholder="Your Name" required />

        <div class="radio-group">
          <label><input type="radio" name="attend" value="yes" /> I will attend</label>
          <label><input type="radio" name="attend" value="no" /> I cannot attend</label>
        </div>

        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
