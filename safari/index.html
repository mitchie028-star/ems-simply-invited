<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan's Wild One Safari Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="start-screen" id="startScreen">
  <div class="intro-content">
    <h1>LET'S GET WILD! 🌿</h1>
    <p>Ethan is turning 4!</p>
    <span>Tap to begin Ethan's adventure</span>
  </div>
</div>

<audio id="jungle" preload="auto">
  <source src="./assets/jungle.mp3" type="audio/mpeg">
</audio>

<audio id="whoosh" preload="auto">
  <source src="./assets/whoosh.mp3" type="audio/mpeg">
</audio>

<video id="bgVideo" class="bg-video" playsinline preload="auto">
  <source src="./assets/safari-bg.mp4" type="video/mp4">
</video>

<img src="./assets/leaf-top-left.png" class="leaf leaf-left" alt="">
<img src="./assets/leaf-top-left.png" class="leaf leaf-right" alt="">

<img src="./assets/boy.png" id="ethan" class="baby" alt="Ethan">

<div class="title" id="title">
  LET'S GET WILD!
</div>

<div class="rsvp-scene" id="rsvp">
  <div class="card">

    <h2>You're Invited 🌿</h2>

    <p class="event-name">
      Ethan's Wild One Safari Adventure
    </p>

    <form id="rsvpForm">

      <input
        type="text"
        placeholder="Your Name"
        required
      >

      <div class="radio-group">

        <label>
          <input
            type="radio"
            name="attending"
            value="yes"
            required
          >
          Yes, we'll be there!
        </label>

        <label>
          <input
            type="radio"
            name="attending"
            value="no"
          >
          Sorry, can't make it
        </label>

      </div>

      <div class="location">
        📍 Shakey's Matalino
      </div>

      <a
        class="map-btn"
        href="https://maps.google.com/?q=Shakeys+Matalino"
        target="_blank"
      >
        View Map
      </a>

      <button type="submit">
        Submit RSVP
      </button>

    </form>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
