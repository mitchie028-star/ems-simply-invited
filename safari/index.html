<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ethan Safari Adventure</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌿 INTRO SCREEN -->
<div class="start-screen" id="startScreen">
  <div>
    <h1>Let’s Get Wild with Ethan 🌿</h1>
    <p>Tap anywhere to begin the safari</p>
  </div>
</div>

<!-- 🎥 BACKGROUND VIDEO -->
<video class="bg-video" id="bgVideo" muted playsinline preload="auto">
  <source src="./assets/safari-bg.mp4" type="video/mp4">
</video>

<!-- 🌿 LEAVES (OPENING CURTAIN) -->
<img src="./assets/leaf-top-left.png" class="leaf leaf-left" id="leafLeft">
<img src="./assets/leaf-top-left.png" class="leaf leaf-right" id="leafRight">

<!-- 👶 ETHAN -->
<img src="./assets/boy.png" class="baby" id="ethan">

<!-- 📝 TITLE -->
<div class="title" id="title">ETHAN IS TURNING 4!</div>

<!-- ✉️ RSVP SCENE -->
<div class="rsvp-scene" id="rsvp">
  <div class="card">
    <h2>Invitation Details</h2>
    <p>📍 Location: Safari Jungle Party</p>
    <p>🗓 Date: Coming Soon</p>
    <p>🎉 RSVP: Confirm Your Attendance</p>
    <button>RSVP NOW</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
