<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ethan Safari Adventure</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌿 INTRO -->
<div class="start-screen" id="startScreen">
  <div>
    <h1>Let’s Get Wild with Ethan 🌿</h1>
    <p>Tap anywhere to begin the safari</p>
  </div>
</div>

<!-- 🎥 VIDEO -->
<video class="bg-video" id="bgVideo" muted playsinline preload="auto">
  <source src="./assets/safari-bg.mp4" type="video/mp4">
</video>

<!-- 🌿 LEAVES -->
<img src="./assets/leaf-top-left.png" class="leaf leaf-left">
<img src="./assets/leaf-top-left.png" class="leaf leaf-right">

<!-- 👶 ETHAN -->
<img src="./assets/boy.png" class="baby" id="ethan">

<!-- 📝 TITLE -->
<div class="title" id="title">LET'S GET WILD!</div>

<!-- ✉️ RSVP + MAP (LOWERED) -->
<div class="rsvp-scene" id="rsvp">

  <div class="card">

    <h2>You're Invited 🌿</h2>

    <p><b>Ethan’s Wild One Safari Adventure</b></p>

    <!-- RSVP FORM -->
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <button type="submit">Confirm RSVP</button>
    </form>

    <!-- MAP -->
    <div class="map">
      <iframe
        src="https://www.google.com/maps?q=Quezon+City&output=embed"
        loading="lazy">
      </iframe>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
