<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ethan Safari Adventure</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" class="start-screen">
  <div class="intro-content">
    <h1>Ethan Safari Adventure Awaits</h1>
  </div>
</div>

<!-- LEAF STACK (LEFT) -->
<div class="leaf left leaf-back"></div>
<div class="leaf left leaf-front"></div>

<!-- LEAF STACK (RIGHT) -->
<div class="leaf right leaf-back"></div>
<div class="leaf right leaf-front"></div>

<!-- VIDEO -->
<video id="bgVideo" class="bg-video" playsinline muted loop preload="auto">
  <source src="./assets/safari-bg.mp4" type="video/mp4" />
</video>

<!-- AUDIO -->
<audio id="jungleAudio" src="./assets/jungle.mp3" loop preload="auto"></audio>
<audio id="whooshAudio" src="./assets/whoosh.mp3" preload="auto"></audio>

<script src="script.js"></script>

</body>
</html>
