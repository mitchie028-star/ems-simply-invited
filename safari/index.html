<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan's Wild One Safari Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="scene">

    <!-- Safari Background -->
    <img src="./assets/safari-bg.png" alt="Safari Background" class="bg">

    <!-- Opening Leaves -->
    <div class="leaf left-leaf"></div>
    <div class="leaf right-leaf"></div>

    <!-- Birthday Boy -->
    <img src="./assets/boy.png" alt="Birthday Boy" class="baby">

    <!-- Animals -->
    <img src="./assets/monkey.png" alt="Monkey" class="monkey">

    <img src="./assets/parrot.png" alt="Parrot" class="parrot">

    <img src="./assets/lion.png" alt="Lion" class="lion">

    <!-- Main Title -->
    <div class="title">

        <h1>
            LET'S<br>
            GET<br>
            WILD!
        </h1>

        <p>
            Ethan's Wild One Safari Adventure
        </p>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
