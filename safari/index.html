<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethan's Wild One Safari Adventure</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="scene">

  <!-- Background -->
  <img src="./assets/safari-bg.png" class="bg" alt="Safari Background">

  <!-- Cinematic Effects -->
  <div class="sunrays"></div>
  <div class="fog fog1"></div>
  <div class="fog fog2"></div>

  <!-- Leaves -->
  <div class="leaf left-leaf"></div>
  <div class="leaf right-leaf"></div>

  <!-- Characters -->
  <img src="./assets/boy.png" class="baby" alt="Birthday Boy">
  <img src="./assets/monkey.png" class="monkey" alt="Monkey">
  <img src="./assets/parrot.png" class="parrot" alt="Parrot">
  <img src="./assets/lion.png" class="lion" alt="Lion">

  <!-- Title -->
  <div class="title">
    <h1>LET'S<br>GET<br>WILD!</h1>
    <p>Ethan's Wild One Safari Adventure</p>
  </div>

</div>

<!-- Sounds -->
<audio id="whoosh1" src="./assets/whoosh.mp3"></audio>
<audio id="whoosh2" src="./assets/whoosh.mp3"></audio>
<audio id="roar" src="./assets/roar.mp3"></audio>

<script src="script.js"></script>

</body>
</html>
