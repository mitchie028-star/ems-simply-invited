<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ethan Safari Adventure</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- SCENE 1 -->
<div id="startScreen" class="start-screen">
  <h1 class="hero-title">Ethan's Safari Adventure Awaits</h1>
</div>

<div id="jungleOverlay" class="jungle-overlay"></div>

<!-- VIDEO -->
<video id="bgVideo" class="bg-video" playsinline muted preload="auto">
  <source src="./assets/safari-bg.mp4" type="video/mp4" />
</video>

<!-- SCENE 2 -->
<div class="scene2">

  <div class="title2">
    Ethan is turning 4!
    <span class="subtitle">Join the adventure</span>
  </div>

  <img src="./assets/boy.png" class="ethan" alt="Ethan" />

</div>

<!-- SCENE 3 -->
<div class="scene3">

  <a class="location"
     href="https://www.google.com/maps/search/?api=1&query=Shakey's+Matalino+Quezon+City"
     target="_blank">
    📍 Shakey's Matalino
  </a>

  <div class="rsvp-card">
    <h3>RSVP</h3>

    <p class="rsvp-question">Will you join the adventure?</p>

    <div class="rsvp-buttons">
      <button class="yes">Yes, I'm coming</button>
      <button class="no">Not this time</button>
    </div>

    <p class="rsvp-note">We’ll collect details soon ✨</p>
  </div>

</div>

<!-- AUDIO -->
<audio id="jungleAudio" src="./assets/jungle.mp3" loop preload="auto"></audio>
<audio id="whooshAudio" src="./assets/whoosh.mp3" preload="auto"></audio>

<script src="script.js"></script>

</body>
</html>
