<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Safari Scene 1</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" class="start-screen">
  <div class="intro-content">
    <h1>Tap to Begin</h1>
    <p>Safari Adventure Awaits</p>
  </div>
</div>

<!-- LEAVES -->
<div class="leaf left-leaf"></div>
<div class="leaf right-leaf"></div>

<!-- VIDEO BACKGROUND -->
<video id="bgVideo" class="bg-video" playsinline muted loop preload="auto">
  <source src="./assets/safari-bg.mp4" type="video/mp4" />
</video>

<!-- AUDIO -->
<audio id="jungleAudio" src="./assets/jungle.mp3" loop preload="auto"></audio>
<audio id="whooshAudio" src="./assets/whoosh.mp3" preload="auto"></audio>

<script src="script.js"></script>

</body>
</html>
