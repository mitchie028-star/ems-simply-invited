<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ethan Safari Adventure</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- =========================
     SCENE 1: START SCREEN
========================= -->
<div id="startScreen" class="start-screen">
  <h1 class="hero-title">Ethan Safari Adventure Awaits</h1>
</div>

<!-- =========================
     SCENE 1: LEAVES OVERLAY
========================= -->
<div id="jungleOverlay" class="jungle-overlay"></div>

<!-- =========================
     BACKGROUND VIDEO
========================= -->
<video id="bgVideo" class="bg-video" playsinline muted loop preload="auto">
  <source src="./assets/safari-bg.mp4" type="video/mp4" />
</video>

<!-- =========================
     SCENE 2: MAIN CONTENT
========================= -->
<div class="scene2">

  <img src="./assets/boy.png" class="ethan" alt="Ethan" />

  <div class="title2">
    Ethan’s Safari Adventure
  </div>

</div>

<!-- =========================
     AUDIO LAYERS
========================= -->
<audio id="jungleAudio" src="./assets/jungle.mp3" loop preload="auto"></audio>
<audio id="whooshAudio" src="./assets/whoosh.mp3" preload="auto"></audio>

<script src="script.js"></script>

</body>
</html>
