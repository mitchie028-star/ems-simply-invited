<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Safari Invitation</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="overlay"></div>

  <div class="bg"></div>

  <!-- Scene 1 -->
  <section class="scene active">
    <h1>A Wild Adventure Awaits...</h1>
  </section>

  <!-- Scene 2 -->
  <section class="scene">
    <img src="./assets/boy.png" class="baby" />
    <h2>Meet the Explorer</h2>
  </section>

<!-- Scene 3 -->
<section class="scene jungle-scene">

  <div class="jungle-depth">
    <div class="fog-layer fog-1"></div>
    <div class="fog-layer fog-2"></div>
  </div>

  <div class="animal-area">

    <img src="./assets/parrot.png" class="parrot layer" data-speed="3">
    <img src="./assets/monkey.png" class="monkey layer" data-speed="2">
    <img src="./assets/giraffe.png" class="giraffe layer" data-speed="1.5">
    <img src="./assets/lion.png" class="lion layer" data-speed="1.2">
    <img src="./assets/elephant.png" class="elephant layer" data-speed="1">

    <img src="./assets/boy.png" class="baby-center layer" data-speed="0.8">

  </div>

  <h2 class="jungle-title">LET'S GET WILD!</h2>

</section>

  <!-- Scene 4 -->
  <section class="scene">
    <h2>You're Invited!</h2>
    <h3>June 25, 2026</h3>
    <h3>2:00 PM</h3>
  </section>

  <!-- Scene 5 -->
  <section class="scene">
    <h2>Adventure Map</h2>
    <p>🏠 → 🦁 → 📍 Venue</p>
  </section>

  <!-- Scene 6 -->
  <section class="scene">
    <h2>RSVP</h2>

    <input placeholder="Name">
    <input placeholder="Number of Guests">
    <textarea placeholder="Message"></textarea>

    <button id="btn">Send RSVP</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
