<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simple Landing Page Builder</title>

  <link rel="stylesheet" href="style.css"/>
</head>

<body>

  <!-- 🎬 HERO VIDEO BACKGROUND -->
  <video autoplay muted loop playsinline id="bgVideo">
    <source src="assets/intro.mp4" type="video/mp4" />
  </video>

  <!-- 🌟 HERO CONTENT (filled by JS) -->
  <header class="hero">
    <h1 id="heroTitle"></h1>
    <p id="heroSubtitle"></p>
  </header>

  <!-- 🎮 SCROLL INDICATOR -->
  <div class="scroll-hint">
    ↓ Scroll to explore
  </div>

  <!-- 🧱 DYNAMIC SECTIONS (JS BUILDS THIS) -->
  <main id="sections"></main>

  <!-- 👑 FOOTER -->
  <footer class="footer">
    <p>Built with Simple Landing Page Builder</p>
  </footer>

  <!-- ⚙️ ENGINE -->
  <script src="script.js"></script>

</body>
</html>
