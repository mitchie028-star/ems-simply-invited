<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dance Party Invitation</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="assets/mobile.mp4" media="(max-width: 768px)">
    <source src="assets/desktop.mp4" media="(min-width: 769px)">
    Your browser does not support the video tag.
  </video>

  <div class="overlay"></div>

  <main class="content">
    
    <div class="hero-image-container">
      <img src="assets/profile.jpg" alt="The Queen" class="profile-img">
    </div>

    <section class="text">
      <h1>All Hail</h1>
      <h2>The Queen of the Dance Floor</h2>
      <h1 class="name">Mary</h1>
      <p class="subtitle">65th Birthday Party</p>
      <div class="scroll">↓ Scroll Down ↓</div>
    </section>

    <section class="details">
      <h3>Event Details</h3>
      <p><strong>Date:</strong> Saturday, June 20</p>
      <p><strong>Time:</strong> 6:00 PM</p>
      <p><strong>Venue:</strong> To be announced</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
