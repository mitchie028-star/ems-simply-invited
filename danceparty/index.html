<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dance Party Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- VIDEO BACKGROUND -->
  <div class="video-container">

    <!-- Desktop Video -->
    <video class="bg-video desktop-video" autoplay muted loop playsinline>
      <source src="assets/desktop.mp4" type="video/mp4">
    </video>

    <!-- Mobile Video -->
    <video class="bg-video mobile-video" autoplay muted loop playsinline>
      <source src="assets/mobile.mp4" type="video/mp4">
    </video>

    <!-- DARK OVERLAY -->
    <div class="overlay"></div>

  </div>

  <!-- MAIN CONTENT -->
  <div class="content">

    <!-- RING IMAGE -->
    <div class="ring-wrapper">
      <img src="assets/ring.png" alt="Ring Frame" class="ring-frame">

      <!-- Replaceable masked image inside ring -->
      <div class="ring-inner">
        <img src="assets/profile.jpg" alt="Center Image">
      </div>
    </div>

    <!-- TEXT -->
    <div class="text">
      <h1>All Hail</h1>
      <h2>The Queen of the Dance Floor</h2>
      <h1>Mary</h1>
      <p class="age">65th Birthday Party</p>

      <div class="scroll">
        ↓ Scroll Down ↓
      </div>
    </div>

    <!-- EVENT DETAILS -->
    <section class="details">
      <h3>Event Details</h3>

      <p><strong>Date:</strong> Saturday, June 20</p>
      <p><strong>Time:</strong> 6:00 PM</p>
      <p><strong>Venue:</strong> To be announced</p>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
