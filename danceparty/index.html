<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Dance Party Invitation</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Poppins:wght@300;400;500;600&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="style.css">

</head>

<body>

<section class="hero">

    <video
        class="background-video"
        autoplay
        muted
        loop
        playsinline>

        <source
            src="assets/ring-video.mp4"
            type="video/mp4">

    </video>


    <div class="hero-top hidden">

        <div id="tagline"></div>

        <div id="subtitle"></div>

    </div>


    <div class="hero-bottom hidden">

        <h1 id="celebrant"></h1>

        <div id="occasion"></div>

        <div class="scroll">

            ↓ Scroll Down ↓

        </div>

    </div>

</section>



<section class="details">

    <h2>Event Details</h2>


    <div class="card">

        <h3>Date</h3>

        <p id="date"></p>

    </div>


    <div class="card">

        <h3>Time</h3>

        <p id="time"></p>

    </div>


    <div class="card">

        <h3>Venue</h3>

        <p id="venue"></p>

    </div>

</section>


<script src="data.js"></script>

<script src="script.js"></script>

</body>

</html>
