<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dance Party Invitation</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- BACKGROUND VIDEO (DESKTOP) -->
  <video class="bg-video desktop-video" autoplay muted loop playsinline>
    <source src="assets/desktop.mp4" type="video/mp4">
  </video>

  <!-- BACKGROUND VIDEO (MOBILE) -->
  <video class="bg-video mobile-video" autoplay muted loop playsinline>
    <source src="assets/mobile.mp4" type="video/mp4">
  </video>

  <!-- OVERLAY -->
  <div class="overlay"></div>

  <!-- CONTENT -->
  <div class="content">

    <!-- SIMPLE RING PLACEHOLDER (NO BROKEN FILES) -->
    <div class="ring-wrapper">
      <div class="ring-circle">
        <span>Center Image</span>
      </div>
    </div>

    <!-- TEXT -->
    <div class="text">
      <h1>All Hail</h1>
      <h2>The Queen of the Dance Floor</h2>
      <h1>Mary</h1>
      <p>65th Birthday Party</p>

      <div class="scroll">↓ Scroll Down ↓</div>
    </div>

    <!-- DETAILS -->
    <section class="details">
      <h3>Event Details</h3>
      <p><strong>Date:</strong> Saturday, June 20</p>
      <p><strong>Time:</strong> 6:00 PM</p>
      <p><strong>Venue:</strong> To be announced</p>
    </section>

  </div>

</body>
</html>
