<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Dance Party Invitation</title>

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

    <section class="hero">

        <video
            class="ring-video"
            autoplay
            muted
            loop
            playsinline>

            <source
                src="assets/ring-video.mp4"
                type="video/mp4">

        </video>


        <div class="hero-content">

            <h2 id="subtitle"></h2>

            <h1 id="name"></h1>

            <p id="title"></p>

            <div class="scroll-indicator">
                ↓ Scroll Down ↓
            </div>

        </div>

    </section>


    <section class="details">

        <div class="card">

            <h2>Event Details</h2>

            <div class="info">

                <h3>Date</h3>

                <p id="date"></p>

            </div>


            <div class="info">

                <h3>Time</h3>

                <p id="time"></p>

            </div>


            <div class="info">

                <h3>Venue</h3>

                <p id="venue"></p>

            </div>

        </div>

    </section>


    <script src="data.js"></script>

    <script src="script.js"></script>

</body>

</html>
